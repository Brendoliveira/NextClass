<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/png" href="imagens/Black and White Modern Initials Creative Agency Logo.png">
    <link rel="stylesheet" href="Css/login.css">
    <title>Login - NextClass</title>
</head>
<body>

    <div class="container">

        <div class="form-image">
            <img src="imagens/Chapeu.png" alt="">
        </div>

        <div class="form">
            <form action="#">

                <div class="form-header">

                    <div class="title">
                        <h1>Entrar na conta</h1>
                    </div>

                    <div class="login-button">
                        <button><a href="cadastro.html">Cadastrar</a></button>
                    </div>

                </div>

                <div class="input-group">

                    <div class="input-box">
                        <label for="email">E-mail</label>
                        <input id="email" type="email" name="email" placeholder="Digite seu e-mail" required>
                    </div>

                    <div class="input-box">
                        <label for="password">Senha</label>
                        <input id="password" type="password" name="password" placeholder="Digite sua senha" required>
                    </div>

                </div>

                <div class="continue-button">
                    <button><a href="#">Entrar</a></button>
                </div>

            </form>
        </div>

    </div>

</body>
</html>
